<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Sheddy Pet Widget</title>
<style>
  /* OBS 브라우저 소스용: 배경 완전 투명 */
  html, body { margin: 0; padding: 0; background: transparent; overflow: hidden; }
  #stage { position: relative; width: 100vw; height: 100vh; }
  #stage video {
    position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: contain; opacity: 0;
  }
  #stage video.visible { opacity: 1; }

  /* 마우스 오버 시 나타나는 버튼들 (⚙️ 설정 / 🎭 모션 선택) */
  #gearBtn, #motionBtn {
    position: fixed; top: 10px; left: 10px; z-index: 11;
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(30, 30, 34, .75); color: #fff;
    border: none; cursor: pointer; font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity .25s;
  }
  #gearBtn.show, #motionBtn.show { opacity: 1; pointer-events: auto; }
  #motionBtn { top: auto; bottom: 10px; }

  /* F2 또는 설정 버튼으로 여닫는 마이크 설정창 */
  #settings {
    position: fixed; top: 12px; left: 12px; z-index: 10;
    background: rgba(30, 30, 34, .92); color: #eee;
    font-family: "Segoe UI", sans-serif; font-size: 13px;
    border-radius: 10px; padding: 14px 16px; width: 300px;
    display: none; flex-direction: column; gap: 10px;
    box-shadow: 0 4px 16px rgba(0,0,0,.4);
    /* 작은 OBS 소스에서도 패널이 화면 밖으로 넘치지 않게 */
    box-sizing: border-box; max-height: calc(100vh - 24px);
  }
  #settings.open { display: flex; }
  #settings h3 { margin: 0; font-size: 14px; }
  #settings label { display: flex; flex-direction: column; gap: 4px; }
  #settings input[type=range] { width: 100%; }
  /* OBS(CEF)는 select 팝업 미지원 → 클릭 목록으로 대체 */
  #micList {
    display: flex; flex-direction: column; gap: 2px;
    max-height: 150px; overflow-y: auto;
    background: rgba(0,0,0,.25); border-radius: 6px; padding: 4px;
    /* 패널이 뷰포트에 눌리면 목록이 줄어들며 스크롤됨 */
    flex: 0 1 auto; min-height: 40px;
  }
  .mic-item, .motion-cat { flex-shrink: 0; } /* 스크롤 시 행 높이 유지 */
  /* OBS(CEF)에서도 보이는 스크롤바 */
  #micList::-webkit-scrollbar, #motionList::-webkit-scrollbar { width: 8px; }
  #micList::-webkit-scrollbar-thumb, #motionList::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,.28); border-radius: 4px;
  }
  #micList::-webkit-scrollbar-track, #motionList::-webkit-scrollbar-track {
    background: rgba(255,255,255,.06); border-radius: 4px;
  }
  .mic-item {
    padding: 6px 8px; border-radius: 5px; cursor: pointer;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .mic-item:hover { background: rgba(255,255,255,.12); }
  .mic-item.selected { background: #f5c518; color: #222; font-weight: 600; }
  #levelWrap { height: 10px; background: #222; border-radius: 5px; overflow: hidden; position: relative; }
  #levelBar { height: 100%; width: 0%; background: #4caf50; transition: width .05s linear; }
  #levelThresh { position: absolute; top: 0; bottom: 0; width: 2px; background: #ff5252; }
  #micStatus { font-size: 12px; color: #aaa; }

  /* F3 또는 🎭 버튼으로 여닫는 모션 선택창 (좌측 하단) */
  #motionPanel {
    position: fixed; bottom: 12px; left: 12px; z-index: 10;
    background: rgba(30, 30, 34, .92); color: #eee;
    font-family: "Segoe UI", sans-serif; font-size: 13px;
    border-radius: 10px; padding: 14px 16px; width: 230px;
    display: none; flex-direction: column; gap: 10px;
    box-shadow: 0 4px 16px rgba(0,0,0,.4);
    /* 작은 OBS 소스에서도 패널이 화면 밖으로 넘치지 않게 */
    box-sizing: border-box; max-height: calc(100vh - 24px);
  }
  #motionPanel.open { display: flex; }
  #motionPanel h3 { margin: 0; font-size: 14px; }
  #motionPanel label {
    display: flex; align-items: center; gap: 6px; font-size: 12px; cursor: pointer;
  }
  #motionList {
    display: flex; flex-direction: column; gap: 2px;
    max-height: 240px; overflow-y: auto;
    background: rgba(0,0,0,.25); border-radius: 6px; padding: 4px;
    /* 패널이 뷰포트에 눌리면 목록이 줄어들며 스크롤됨 */
    flex: 0 1 auto; min-height: 40px;
  }
  .motion-cat {
    margin-top: 4px; padding: 2px 4px;
    font-size: 11px; color: #999; text-transform: uppercase;
  }
</style>
</head>
<body>
<div id="stage">
  <!-- 더블 버퍼: 하나가 재생되는 동안 다른 쪽에 다음 클립을 미리 로드 -->
  <video id="vidA" muted playsinline preload="auto"></video>
  <video id="vidB" muted playsinline preload="auto"></video>
</div>

<!-- 마우스를 움직이면 나타나는 설정 버튼 (OBS: 소스 우클릭 → 상호작용) -->
<button id="gearBtn" type="button" title="마이크 설정">⚙️</button>

<div id="settings">
  <h3>🎤 마이크 설정 <span style="font-weight:400;color:#888">(⚙️/F2로 닫기)</span></h3>
  <label>입력 장치</label>
  <div id="micList"><div class="mic-item selected">(마이크 끄기)</div></div>
  <button id="micRefresh" type="button"
          style="padding:5px 10px;border-radius:6px;border:none;cursor:pointer">
    🔄 장치 목록 새로고침</button>
  <label>감도 임계값 <span id="threshLabel"></span>
    <input type="range" id="threshSlider" min="0.005" max="0.15" step="0.005">
  </label>
  <div id="levelWrap"><div id="levelBar"></div><div id="levelThresh"></div></div>
  <div id="micStatus">마이크 꺼짐</div>
</div>

<!-- 좌측 하단: 모션 선택 버튼 + 패널 (OBS: 소스 우클릭 → 상호작용) -->
<button id="motionBtn" type="button" title="모션 선택">🎭</button>

<div id="motionPanel">
  <h3>🎭 모션 선택 <span style="font-weight:400;color:#888">(🎭/F3로 닫기)</span></h3>
  <label><input type="checkbox" id="motionHold"> 선택한 모션 계속 유지 (주사위 정지)</label>
  <div id="motionList"></div>
</div>

<script>
"use strict";

// ── 애니메이션 레지스트리 ─────────────────────────────────────
// start/end가 없는 애니메이션은 loop만 등록하면 됨.
// 파일이 준비되면 여기에 추가. BASE는 서버 배포 시 CDN 경로로 교체.
const BASE = "sprites/";
// ── 2중 가중치 주사위 ──
// 1차: category 가중치로 "분류"를 뽑고 (CATEGORY_WEIGHTS)
// 2차: 그 분류 안에서 weight 가중치로 "행동"을 뽑는다.
// 새 분류를 만들면 CATEGORY_WEIGHTS에도 추가할 것 (없으면 주사위에서 제외됨).
const CATEGORY_WEIGHTS = {
  idle: 50,     // 대기
  basic: 20,    // 소소한 몸짓 (두리번/기지개/흔들)
  happy: 14,    // 행복
  excited: 4,   // 신남
  special: 8,   // 특수 퍼포먼스 (댄스/밈)
  sad: 6,       // 우울
};
// category: 위 분류 키. weight: 같은 분류 안에서의 상대 비율
// minCycles: 이 상태에 진입하면 최소 이만큼 loop를 완주해야 전환 허용
//            (생략 시 MIN_EMOTION_CYCLES. loop 길이가 짧으면 크게 잡을 것)
// maxCycles: 이만큼 완주하면 주사위와 무관하게 idle로 강제 복귀 (생략 시 무제한.
//            ?dice=0이거나 외부 명령으로 pin된 동안에는 적용되지 않음)
// rate:      재생 배속 (기본 1.0). start/loop/end 클립 모두에 적용됨.
//            예) 0.8 = 20% 느리게, 1.5 = 50% 빠르게
const ANIMS = {
  idle1:    { loop: "anim_idle1_loop.webm", category: "idle", weight: 1 },
  basic1:   { loop: "anim_basic1_loop.webm", category: "basic", weight: 1 },
  basic2:   { loop: "anim_basic2_loop.webm", category: "basic", weight: 1 },
  basic3:   { loop: "anim_basic3_loop.webm", category: "basic", weight: 1 },
  happy1:   { start: "anim_happy1_start.webm", loop: "anim_happy1_loop.webm", end: "anim_happy1_end.webm", category: "happy", weight: 3 },
  happy2:   { loop: "anim_happy2_loop.webm", category: "happy", weight: 3 },
  // 공주님 턴 + 커트시 — 한 사이클이 완결된 동작(회전+인사)이라 1~2회만 재생
  happy3:   { loop: "anim_happy3_loop.webm", category: "happy", weight: 2, minCycles: 1, maxCycles: 2, rate: 0.8 },
  excited1: { loop: "anim_excited1_loop.webm", category: "excited", weight: 1 },
  // 킹게이너 댄스 (팔 흔들기) — 0.5배속이라 사이클당 2초, 2~4사이클 = 4~8초
  dance1:   { loop: "anim_dance1_loop.webm", category: "special", weight: 1, minCycles: 2, maxCycles: 4, rate: 0.5 },
  // 거제 야호 (갸루 윙크 + 거꾸로 브이) — 완결형 시퀀스라 1~2회만 재생
  yaho1:    { loop: "anim_yaho1_loop.webm", category: "special", weight: 2, minCycles: 1, maxCycles: 2, rate: 0.53 },
  // 파라파라 댄스 — 24프레임 @12FPS, 0.6배속이라 사이클당 약 3.3초, 2~3사이클 = 6.6~10초
  parapara1:{ loop: "anim_parapara1_loop.webm", category: "special", weight: 1, minCycles: 2, maxCycles: 3, rate: 0.6 },
  // 포케댄스 부기부기뱀뱀 — 16프레임 @12FPS, 0.7배속이라 사이클당 약 1.9초, 2~4사이클 = 3.8~7.6초
  pokedance1:{ loop: "anim_pokedance1_loop.webm", category: "special", weight: 2, minCycles: 2, maxCycles: 4, rate: 0.7 },
  sad1:     { loop: "anim_sad1_loop.webm", category: "sad", weight: 1 },
  sad2:     { loop: "anim_sad2_loop.webm", category: "sad", weight: 1 },
  talk:     { loop: "anim_talk_loop.webm", category: "talk", weight: 0 }, // 주사위 제외, 마이크 전용
};
const DEFAULT_STATE = "idle1";
// loop 한 사이클이 끝날 때마다 이 확률로 주사위를 굴려 상태를 다시 뽑음
// (안 굴리면 현재 loop를 한 번 더 재생)
const REROLL_CHANCE = 0.35;
// 감정(비-idle) 재생 후에는 idle을 최소 이 횟수만큼 돌아야 다음 감정 가능
const MIN_IDLE_CYCLES = 2;
// 감정에 진입하면 최소 이 사이클 수만큼 유지 (3사이클 × 1.8초 = 5.4초)
const MIN_EMOTION_CYCLES = 3;

// ── URL 옵션 ──────────────────────────────────────────────
// ?state=happy1     시작 상태
// ?hold=8           외부 명령(setPetState 등)으로 바뀐 상태를 주사위로부터 보호할 초
// ?dice=0           주사위 굴리기 끄기 (외부 제어 전용 모드)
// ?flip=1           좌우 반전
const params = new URLSearchParams(location.search);
const HOLD_SEC = Number(params.get("hold") || 8);
const DICE_ON = params.get("dice") !== "0";
if (params.get("flip") === "1") {
  document.getElementById("stage").style.transform = "scaleX(-1)";
}

// ── 더블 버퍼 비디오 플레이어 ─────────────────────────────────
const vids = [document.getElementById("vidA"), document.getElementById("vidB")];
let front = 0; // 현재 화면에 보이는 쪽

function backVid() { return vids[1 - front]; }

function swap() {
  vids[1 - front].classList.add("visible");
  const old = vids[front];
  old.classList.remove("visible");
  old.onended = null; // 숨겨진 쪽이 사이클 콜백을 중복 발화하지 않도록
  old.pause();
  front = 1 - front;
}

// 뒤 버퍼에 클립을 로드하고, 재생 가능해지면 스왑해서 재생 시작
function playClip(file, { loop = false, onEnded = null, rate = 1 } = {}) {
  const v = backVid();
  v.loop = loop;
  v.onended = null;
  v.src = BASE + file;
  v.load();
  // load()가 playbackRate를 초기화하므로 로드 후에 지정
  v.defaultPlaybackRate = rate;
  v.playbackRate = rate;
  return new Promise(resolve => {
    v.oncanplaythrough = () => {
      v.oncanplaythrough = null;
      if (onEnded) v.onended = onEnded;
      v.play().then(() => { swap(); resolve(); }).catch(resolve);
    };
    v.onerror = () => { console.warn("clip load failed:", file); resolve(); };
  });
}

// ── 상태 머신 + 주사위 ─────────────────────────────────────
// 전환 규칙: 현재 상태의 end 재생 → 다음 상태의 start 재생 → loop
// loop는 반복 재생하지 않고, 한 사이클이 끝날 때마다 주사위를 굴려
// 상태를 유지할지(같은 loop 재생) 전환할지 결정한다.
let current = null;      // 현재 상태 이름
let transitioning = false;
let queued = null;       // 전환 중 들어온 다음 요청
let pinnedUntil = 0;     // 외부 명령으로 고정된 시각(ms) — 그때까지 주사위 정지
let talkActive = false;  // 마이크 게이트 열림 여부
let idleStreak = 0;      // 마지막 감정 이후 완주한 idle 사이클 수
let emotionCycles = 0;   // 현재 감정 상태에서 완주한 사이클 수

function pickWeighted(items, weightOf) {
  const total = items.reduce((s, it) => s + weightOf(it), 0);
  let r = Math.random() * total;
  for (const it of items) {
    r -= weightOf(it);
    if (r <= 0) return it;
  }
  return items[items.length - 1];
}

function rollDice() {
  // 감정은 최소 유지 사이클(애니메이션별 minCycles 우선)을 채우기 전엔 끝나지 않음
  const minCycles = ANIMS[current].minCycles ?? MIN_EMOTION_CYCLES;
  if (current !== DEFAULT_STATE && emotionCycles < minCycles) {
    return current;
  }
  if (Math.random() >= REROLL_CHANCE) return current; // 유지
  // 감정 상태에서 굴리면 무조건 idle로 복귀 (감정→감정 직행 금지)
  if (current !== DEFAULT_STATE) return DEFAULT_STATE;
  // 감정 직후에는 idle을 MIN_IDLE_CYCLES 이상 완주해야 다음 감정 허용
  if (idleStreak < MIN_IDLE_CYCLES) return current;
  // weight 0 이거나 분류 가중치가 없는/0인 애니메이션은 주사위 제외
  const pool = Object.entries(ANIMS).filter(([, a]) =>
    (a.weight ?? 1) > 0 && (CATEGORY_WEIGHTS[a.category] ?? 0) > 0);
  if (!pool.length) return current;
  // 1차 주사위: 분류 선택 (등록된 애니메이션이 있는 분류만 후보)
  const cats = [...new Set(pool.map(([, a]) => a.category))];
  const cat = pickWeighted(cats, c => CATEGORY_WEIGHTS[c]);
  // 2차 주사위: 그 분류 안에서 행동 선택
  const [name] = pickWeighted(
    pool.filter(([, a]) => a.category === cat), ([, a]) => a.weight ?? 1);
  return name;
}

// loop 한 사이클이 끝났을 때
function onCycleEnd() {
  if (transitioning) return;
  // 마이크에 신호가 들어오는 동안은 talk 상태를 계속 유지
  if (talkActive) {
    if (current !== "talk") { setState("talk", { pin: false }); return; }
    const v = vids[front];
    v.currentTime = 0;
    v.play().catch(() => {});
    return;
  }
  if (current === "talk") { setState(DEFAULT_STATE, { pin: false }); return; }
  if (current === DEFAULT_STATE) idleStreak++; // idle 사이클 1회 완주
  else emotionCycles++;                        // 감정 사이클 1회 완주
  const diceActive = DICE_ON && Date.now() >= pinnedUntil;
  // maxCycles 도달 시 강제 idle 복귀 (외부 제어 모드/pin 중에는 손대지 않음)
  const maxCycles = ANIMS[current].maxCycles;
  if (diceActive && current !== DEFAULT_STATE && maxCycles &&
      emotionCycles >= maxCycles) {
    setState(DEFAULT_STATE, { pin: false });
    return;
  }
  const next = diceActive ? rollDice() : current;
  if (next === current) {
    // 같은 상태 유지: 같은 버퍼를 처음부터 다시 재생 (재로드 없음)
    const v = vids[front];
    v.currentTime = 0;
    v.play().catch(() => {});
  } else {
    setState(next, { pin: false });
  }
}

async function setState(name, { pin = true } = {}) {
  if (!ANIMS[name]) { console.warn("unknown state:", name); return; }
  if (transitioning) { queued = name; return; }
  if (name === current) {
    if (pin) pinnedUntil = Date.now() + HOLD_SEC * 1000;
    return;
  }
  transitioning = true;
  if (pin) pinnedUntil = Date.now() + HOLD_SEC * 1000;
  if (name !== DEFAULT_STATE) { idleStreak = 0; emotionCycles = 0; } // 감정 진입

  // 1) 현재 상태의 end 클립 (있으면) 재생하고 끝날 때까지 대기
  const cur = current && ANIMS[current];
  if (cur && cur.end) {
    await new Promise(res => playClip(cur.end, { onEnded: res, rate: cur.rate ?? 1 }));
  }

  // 2) 다음 상태의 start (있으면) → loop (사이클 끝마다 주사위)
  const next = ANIMS[name];
  const rate = next.rate ?? 1;
  if (next.start) {
    await new Promise(res => playClip(next.start, { onEnded: res, rate }));
  }
  current = name; // onCycleEnd가 참조하므로 loop 시작 전에 갱신
  renderMotionHighlight(); // 모션 선택창의 현재 상태 표시 동기화
  await playClip(next.loop, { onEnded: onCycleEnd, rate });

  transitioning = false;
  if (queued) { const q = queued; queued = null; setState(q); }
}

// ── 외부 제어 인터페이스 ──────────────────────────────────────
// 외부 명령은 HOLD_SEC 동안 주사위로부터 상태를 보호(pin)한다.
// 1) 콘솔/OBS에서 직접: window.setPetState('happy1')
window.setPetState = name => setState(name);

// 2) postMessage: iframe이나 OBS custom code에서
//    window.postMessage({ type: 'pet-state', state: 'happy1' }, '*')
window.addEventListener("message", e => {
  if (e.data && e.data.type === "pet-state") setState(e.data.state);
});

// 3) BroadcastChannel: 같은 서버의 컨트롤 페이지에서
//    new BroadcastChannel('sheddy-pet').postMessage('happy1')
try {
  new BroadcastChannel("sheddy-pet").onmessage = e => setState(e.data);
} catch (_) { /* 미지원 브라우저 */ }

// ── 마이크 → 말하기(talk) 게이트 ─────────────────────────────
// F2: 설정창 토글. 장치를 선택하면 마이크를 열고 RMS 레벨을 감시.
// 노이즈 게이트: 임계값 초과 시 즉시 talk, 임계값 아래로 RELEASE_MS
// 지속되면 해제. noiseSuppression/echoCancellation 제약으로 기본 필터 적용.
const RELEASE_MS = 450;
const settingsEl = document.getElementById("settings");
const micList = document.getElementById("micList");
const threshSlider = document.getElementById("threshSlider");
const threshLabel = document.getElementById("threshLabel");
const levelBar = document.getElementById("levelBar");
const levelThresh = document.getElementById("levelThresh");
const micStatus = document.getElementById("micStatus");

let audioCtx = null, analyser = null, micStream = null, meterTimer = null;
let lastLoudAt = 0;

threshSlider.value = localStorage.getItem("petMicThresh") || "0.03";

function threshold() { return Number(threshSlider.value); }

function updateThreshUI() {
  threshLabel.textContent = threshold().toFixed(3);
  levelThresh.style.left = `${Math.min(100, threshold() / 0.15 * 100)}%`;
}
updateThreshUI();

let micValue = localStorage.getItem("petMicDevice") || "__off__";

function selectMic(id) {
  micValue = id;
  localStorage.setItem("petMicDevice", id);
  renderMicHighlight();
  startMic(id);
}

function renderMicHighlight() {
  [...micList.children].forEach(row =>
    row.classList.toggle("selected", row.dataset.id === micValue));
}

async function listDevices() {
  const devs = await navigator.mediaDevices.enumerateDevices();
  const items = [{ id: "__off__", label: "(마이크 끄기)" }];
  devs.filter(d => d.kind === "audioinput").forEach((d, i) => {
    // 권한 허용 전에는 label/deviceId가 빈 값으로 옴 — 기본 장치로 취급
    items.push({
      id: d.deviceId || "__default__",
      label: d.label || `마이크 ${i + 1} (이름은 권한 허용 후 표시)`,
    });
  });
  micList.innerHTML = "";
  for (const it of items) {
    const row = document.createElement("div");
    row.className = "mic-item";
    row.dataset.id = it.id;
    row.textContent = it.label;
    row.addEventListener("click", () => selectMic(it.id));
    micList.appendChild(row);
  }
  renderMicHighlight();
}

function stopMic() {
  clearInterval(meterTimer);
  meterTimer = null;
  if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
  analyser = null;
  levelBar.style.width = "0%";
  micStatus.textContent = "마이크 꺼짐";
  if (talkActive) { talkActive = false; setState(DEFAULT_STATE, { pin: false }); }
}

async function startMic(deviceId) {
  stopMic();
  if (!deviceId || deviceId === "__off__") return;
  try {
    const audio = {
      noiseSuppression: true,   // 간단한 노이즈 필터
      echoCancellation: true,
      autoGainControl: false,
    };
    // "__default__" = 권한 전 익명 장치 → 기본 마이크로 열기
    if (deviceId !== "__default__") audio.deviceId = { exact: deviceId };
    micStream = await navigator.mediaDevices.getUserMedia({ audio });
    // 권한이 열렸으니 무조건 목록을 실제 라벨로 다시 그림
    const track = micStream.getAudioTracks()[0];
    const realId = (track.getSettings && track.getSettings().deviceId) || deviceId;
    micValue = realId;
    localStorage.setItem("petMicDevice", realId);
    await listDevices();
    audioCtx = audioCtx || new AudioContext();
    await audioCtx.resume();
    const src = audioCtx.createMediaStreamSource(micStream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 1024;
    src.connect(analyser);
    const buf = new Float32Array(analyser.fftSize);
    micStatus.textContent = "마이크 감시 중";
    meterTimer = setInterval(() => {
      analyser.getFloatTimeDomainData(buf);
      let sum = 0;
      for (let i = 0; i < buf.length; i++) sum += buf[i] * buf[i];
      const rms = Math.sqrt(sum / buf.length);
      levelBar.style.width = `${Math.min(100, rms / 0.15 * 100)}%`;
      levelBar.style.background = rms > threshold() ? "#ffb300" : "#4caf50";
      const now = Date.now();
      if (rms > threshold()) {
        lastLoudAt = now;
        if (!talkActive) {
          talkActive = true;
          micStatus.textContent = "🗣 말하는 중";
          if (current !== "talk") setState("talk", { pin: false });
        }
      } else if (talkActive && now - lastLoudAt > RELEASE_MS) {
        talkActive = false;
        micStatus.textContent = "마이크 감시 중";
        // 상태 복귀는 onCycleEnd가 처리 (입 다무는 타이밍이 자연스럽게 맞음)
      }
    }, 50);
  } catch (e) {
    micStatus.textContent = `마이크 오류: ${e.name}`;
  }
}

document.getElementById("micRefresh").addEventListener("click", async () => {
  // 권한을 한 번 열어 라벨을 확보한 뒤 목록을 다시 그림
  try {
    const tmp = await navigator.mediaDevices.getUserMedia({ audio: true });
    tmp.getTracks().forEach(t => t.stop());
  } catch (e) {
    micStatus.textContent = `권한 거부됨: ${e.name}`;
  }
  await listDevices();
});
threshSlider.addEventListener("input", () => {
  localStorage.setItem("petMicThresh", threshSlider.value);
  updateThreshUI();
});

async function toggleSettings() {
  settingsEl.classList.toggle("open");
  if (settingsEl.classList.contains("open")) {
    // 장치 라벨을 얻기 위해 권한을 한 번 요청
    try {
      const tmp = await navigator.mediaDevices.getUserMedia({ audio: true });
      tmp.getTracks().forEach(t => t.stop());
    } catch (_) { /* 거부돼도 목록은 시도 */ }
    await listDevices();
  }
}

window.addEventListener("keydown", e => {
  if (e.code !== "F2") return;
  e.preventDefault();
  toggleSettings();
});

// 마우스가 움직이면 버튼들을 잠깐 보여줌 (2.5초 무동작 시 숨김)
const gearBtn = document.getElementById("gearBtn");
let gearTimer = null;
window.addEventListener("mousemove", () => {
  gearBtn.classList.add("show");
  motionBtn.classList.add("show");
  clearTimeout(gearTimer);
  gearTimer = setTimeout(() => {
    gearBtn.classList.remove("show");
    motionBtn.classList.remove("show");
  }, 2500);
});
gearBtn.addEventListener("click", toggleSettings);

// ── 모션 선택기 (좌측 하단, 🎭/F3) ────────────────────────────
// 등록된 모든 애니메이션을 나열하고, 클릭하면 해당 모션을 강제 실행한다.
// 기본은 HOLD_SEC 동안만 주사위로부터 보호. "계속 유지"를 켜면 다시 풀 때까지
// 주사위를 완전히 정지하고 그 모션만 반복한다. (maxCycles도 pin 중에는 무시됨)
const motionBtn = document.getElementById("motionBtn");
const motionPanel = document.getElementById("motionPanel");
const motionList = document.getElementById("motionList");
const motionHold = document.getElementById("motionHold");

function renderMotionHighlight() {
  [...motionList.children].forEach(row =>
    row.classList.toggle("selected", row.dataset.name === current));
}

function pickMotion(name) {
  setState(name); // pin: HOLD_SEC 동안 보호 (setState 기본값)
  if (motionHold.checked) pinnedUntil = Infinity; // 유지 모드: 주사위 완전 정지
  renderMotionHighlight();
}

function renderMotionList() {
  motionList.innerHTML = "";
  // 자동 복귀: pin을 해제해서 다음 사이클부터 주사위에 맡김
  const auto = document.createElement("div");
  auto.className = "mic-item";
  auto.textContent = "🎲 자동 (주사위에 맡기기)";
  auto.addEventListener("click", () => {
    motionHold.checked = false;
    pinnedUntil = 0;
    renderMotionHighlight();
  });
  motionList.appendChild(auto);
  // 분류(category)별로 묶어서 표시 — 2중 주사위 구조를 그대로 보여줌
  const entries = Object.entries(ANIMS);
  const cats = [...new Set(entries.map(([, a]) => a.category))];
  for (const cat of cats) {
    const head = document.createElement("div");
    head.className = "motion-cat";
    const cw = CATEGORY_WEIGHTS[cat] ?? 0;
    head.textContent = cat + (cw > 0 ? "" : " (주사위 제외)");
    motionList.appendChild(head);
    for (const [name, a] of entries.filter(([, x]) => x.category === cat)) {
      const row = document.createElement("div");
      row.className = "mic-item";
      row.dataset.name = name;
      const inDice = (a.weight ?? 1) > 0 && cw > 0;
      row.textContent = name + (inDice ? "" : " (주사위 제외)");
      row.addEventListener("click", () => pickMotion(name));
      motionList.appendChild(row);
    }
  }
  renderMotionHighlight();
}
renderMotionList();

// "계속 유지" 토글을 나중에 바꿔도 현재 상태에 즉시 반영
motionHold.addEventListener("change", () => {
  if (motionHold.checked) pinnedUntil = Infinity;
  else if (pinnedUntil === Infinity) pinnedUntil = Date.now() + HOLD_SEC * 1000;
});

function toggleMotionPanel() { motionPanel.classList.toggle("open"); }
motionBtn.addEventListener("click", toggleMotionPanel);
window.addEventListener("keydown", e => {
  if (e.code !== "F3") return;
  e.preventDefault();
  toggleMotionPanel();
});

// 장치 연결/해제 시 목록 갱신
navigator.mediaDevices.addEventListener?.("devicechange", () => {
  if (settingsEl.classList.contains("open")) listDevices();
});

// 저장된 장치가 있으면 자동 시작 (OBS는 권한 자동 허용)
const savedDevice = localStorage.getItem("petMicDevice");
if (savedDevice && savedDevice !== "__off__") {
  navigator.mediaDevices.getUserMedia({ audio: true })
    .then(tmp => { tmp.getTracks().forEach(t => t.stop()); return listDevices(); })
    .then(() => startMic(savedDevice))
    .catch(() => {});
}

// 시작
setState(params.get("state") || DEFAULT_STATE);
</script>
