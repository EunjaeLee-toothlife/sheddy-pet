name: Build and release Desk Toy

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.package.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: package
        name: Verify package version matches tag
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          if [[ "v${version}" != "${GITHUB_REF_NAME}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package version ${version}." >&2
            exit 1
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

  build:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: macos
            build_args: --mac --arm64
          - os: windows-latest
            artifact: windows
            build_args: --win --x64 --arm64
          - os: ubuntu-latest
            artifact: linux
            build_args: --linux --x64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run dist -- ${{ matrix.build_args }}
      - uses: actions/upload-artifact@v4
        with:
          name: desk-toy-${{ needs.verify.outputs.version }}-${{ matrix.artifact }}
          path: |
            dist/*.dmg
            dist/*.exe
            dist/*.AppImage
          if-no-files-found: error
          retention-days: 3

  release:
    needs: [verify, build]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          name: Desk Toy v${{ needs.verify.outputs.version }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: release-assets/*
